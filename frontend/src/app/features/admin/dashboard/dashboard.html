<app-admin-shell>
  <section class="grid shrink-0 grid-cols-1 gap-4 sm:grid-cols-2 xl:grid-cols-4">
      @for (s of stats; track s.label) {
        <div class="surface rounded-xl p-4">
          <div class="flex items-start justify-between">
            <div class="flex flex-col gap-1.5">
              <span class="text-sm font-medium text-gray-400">{{ s.label }}</span>
              <span class="text-3xl font-extrabold" [class]="s.valueColor">{{ s.value }}</span>
              <span
                class="flex w-fit items-center gap-1 rounded-full px-2 py-0.5 text-xs font-semibold"
                [class.bg-green-100]="s.trend === 'up'"
                [class.text-green-700]="s.trend === 'up'"
                [class.bg-red-100]="s.trend === 'down'"
                [class.text-red-600]="s.trend === 'down'"
              >
                <ui-icon
                  [name]="s.trend === 'up' ? 'trending_up' : 'trending_down'"
                  class="text-sm"
                />
                {{ s.delta }}
              </span>
            </div>
            <div class="flex h-12 w-12 items-center justify-center rounded-lg" [class]="s.iconBg">
              <ui-icon [name]="s.icon" class="text-2xl" [class]="s.iconFg" />
            </div>
          </div>
        </div>
      }
    </section>

    <section class="surface flex min-h-105 flex-1 flex-col rounded-2xl p-4 sm:p-6">
      <div class="mb-6 flex flex-col gap-4 sm:flex-row sm:items-center sm:justify-between">
        <ui-segmented
          [options]="categories"
          [value]="activeCategory()"
          (valueChange)="selectCategory($any($event))"
        />
        <div class="flex items-center gap-2">
          <ui-date-selector [value]="activeYear()" />
          <ui-segmented
            [options]="ranges"
            [value]="activeRange()"
            (valueChange)="selectRange($any($event))"
          />
        </div>
      </div>

      <div class="grid min-h-65 flex-1 gap-3 lg:grid-cols-[minmax(0,1fr)_14rem]">
        <div class="overflow-hidden rounded-lg ring-1 ring-inset ring-black/5">
          <div class="overflow-x-auto">
            <div class="min-w-[44rem]">
              <div class="grid grid-cols-7 bg-primary text-center text-xs font-bold text-white">
                <div class="border-r border-white/35 px-2 py-2">Sun</div>
                <div class="border-r border-white/35 px-2 py-2">Mon</div>
                <div class="border-r border-white/35 px-2 py-2">Tue</div>
                <div class="border-r border-white/35 px-2 py-2">Wed</div>
                <div class="border-r border-white/35 px-2 py-2">Thu</div>
                <div class="border-r border-white/35 px-2 py-2">Fri</div>
                <div class="px-2 py-2">Sat</div>
              </div>

              <div class="grid grid-cols-7 text-center text-xs text-gray-900">
                <div class="min-h-14 border-r border-b border-white bg-gray-100 p-1.5"></div>
                <div class="min-h-14 border-r border-b border-white bg-gray-100 p-1.5">
