<app-admin-shell>
  <form
    [formGroup]="form"
    (ngSubmit)="save()"
    class="surface flex min-h-0 flex-1 flex-col overflow-hidden rounded-2xl"
  >
    <div class="mx-5 border-b border-primary/30 py-3.5 sm:mx-7">
      <div class="flex items-center gap-3 text-primary">
        <ui-icon name="person_add" class="text-2xl" />
        <h2 class="text-xl font-black">Add New User</h2>
      </div>
    </div>

    <div class="flex-1 overflow-y-auto p-5 lg:p-7">
      <div class="grid content-start gap-5 sm:grid-cols-2">
        <div class="flex flex-col gap-1.5 sm:col-span-2">
          <label class="text-sm font-bold text-gray-800">Full Name</label>
          <input uiInput type="text" formControlName="fullname" placeholder="Juan Dela Cruz" />
        </div>

        <div class="flex flex-col gap-1.5">
          <label class="text-sm font-bold text-gray-800">Employee ID</label>
          <input uiInput type="text" formControlName="employeeId" placeholder="EMP-0001" />
        </div>

        <div class="flex flex-col gap-1.5">
          <label class="text-sm font-bold text-gray-800">Email</label>
          <input uiInput type="email" formControlName="email" placeholder="name@lpulaguna.edu.ph" />
        </div>

        <div class="flex flex-col gap-1.5">
          <label class="text-sm font-bold text-gray-800">Username</label>
          <input uiInput type="text" formControlName="username" placeholder="jdelacruz" />
        </div>

        <div class="flex flex-col gap-1.5">
          <label class="text-sm font-bold text-gray-800">Password</label>
          <div class="relative">
            <input
              uiInput
              [type]="showPassword() ? 'text' : 'password'"
              formControlName="password"
              placeholder="Minimum 6 characters"
              class="pr-10"
            />
            <button
              type="button"
              (click)="showPassword.set(!showPassword())"
              [title]="showPassword() ? 'Hide password' : 'Show password'"
              class="absolute right-2 top-1/2 flex -translate-y-1/2 cursor-pointer items-center justify-center rounded-lg p-1 text-gray-400 transition-colors hover:text-primary"
            >
              <ui-icon
                [name]="showPassword() ? 'visibility_off' : 'visibility'"
                class="text-lg leading-none"
              />
            </button>
          </div>
        </div>

        <div class="flex flex-col gap-1.5">
          <label class="text-sm font-bold text-gray-800">User Role</label>
          <ui-select formControlName="role" placeholder="Select a role" [options]="roles" />
        </div>

        <div class="flex flex-col gap-1.5">
          <label class="text-sm font-bold text-gray-800">Confirm Password</label>
          <div class="relative">
            <input
              uiInput
              [type]="showConfirm() ? 'text' : 'password'"
              formControlName="confirmPassword"
              placeholder="Re-enter password"
              class="pr-10"
            />
            <button
              type="button"
              (click)="showConfirm.set(!showConfirm())"
              [title]="showConfirm() ? 'Hide password' : 'Show password'"
              class="absolute right-2 top-1/2 flex -translate-y-1/2 cursor-pointer items-center justify-center rounded-lg p-1 text-gray-400 transition-colors hover:text-primary"
            >
              <ui-icon
                [name]="showConfirm() ? 'visibility_off' : 'visibility'"
                class="text-lg leading-none"
              />
            </button>
          </div>
        </div>
      </div>
    </div>

    <div
      class="mx-5 mt-auto flex flex-col-reverse gap-3 border-t border-primary/30 py-3 sm:mx-7 sm:flex-row sm:justify-end"
    >
      <a
        routerLink="/users"
        class="inline-flex cursor-pointer items-center justify-center rounded-lg border border-gray-200 px-6 py-2.5 text-sm font-bold text-gray-700 transition-all hover:border-gray-300 hover:bg-gray-50"
      >
        Cancel
      </a>
      <button uiButton type="submit" class="px-6" [disabled]="saving()">
        <span>{{ saving() ? 'Saving...' : 'Save User' }}</span>
      </button>
    </div>
  </form>
</app-admin-shell>
