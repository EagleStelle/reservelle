<app-admin-shell>
  <form
    [formGroup]="form"
    (ngSubmit)="save()"
    autocomplete="off"
    class="card-surface animate-rise flex min-h-0 flex-1 flex-col overflow-hidden rounded-md"
  >
    <div class="mx-4 border-b border-primary/25 py-3 sm:mx-5">
      <div class="flex items-center gap-2.5 text-primary dark:text-white">
        <ui-icon name="edit_square" class="text-xl" />
        <h2 class="text-lg font-semibold">Update user</h2>
      </div>
    </div>

    <ui-form-feedback
      [saving]="saving()"
      savingText="Saving changes..."
      [error]="error()"
      (dismissed)="error.set(null)"
    />

    <div class="flex-1 overflow-y-auto p-4 lg:p-5">
      @if (loading()) {
        <div class="py-10 text-center text-sm text-gray-500 dark:text-zinc-400">
          Loading user...
        </div>
      } @else if (ready()) {
        <div class="grid content-start gap-4 sm:grid-cols-2">
          <div class="flex flex-col gap-1.5 sm:col-span-2">
            <label
              for="edit-user-fullname"
              class="text-sm font-bold text-gray-800 dark:text-zinc-200"
            >
              Full Name
            </label>
            <input
              uiInput
              id="edit-user-fullname"
              name="editUserFullname"
              type="text"
              formControlName="fullname"
              autocomplete="off"
            />
          </div>

          <div class="flex flex-col gap-1.5">
            <label
              for="edit-user-employee-id"
              class="text-sm font-bold text-gray-800 dark:text-zinc-200"
            >
              Employee ID
            </label>
            <input
              uiInput
              id="edit-user-employee-id"
              name="editUserEmployeeId"
              type="text"
              formControlName="employeeId"
              autocomplete="off"
            />
          </div>

          <div class="flex flex-col gap-1.5">
            <label for="edit-user-email" class="text-sm font-bold text-gray-800 dark:text-zinc-200"
              >Email</label
            >
            <input
              uiInput
              id="edit-user-email"
              name="editUserEmail"
              type="email"
              formControlName="email"
              autocomplete="off"
            />
          </div>

          <div class="flex flex-col gap-1.5">
            <label
              for="edit-user-username"
              class="text-sm font-bold text-gray-800 dark:text-zinc-200"
            >
              Username
            </label>
            <input
              uiInput
              id="edit-user-username"
              name="editUserUsername"
              type="text"
              formControlName="username"
              autocomplete="off"
            />
          </div>

          <div class="flex flex-col gap-1.5">
            <label class="text-sm font-bold text-gray-800 dark:text-zinc-200">Password</label>
            <button uiButton type="button">Reset Password</button>
          </div>

          <div class="flex flex-col gap-1.5">
            <label class="text-sm font-bold text-gray-800 dark:text-zinc-200">User Role</label>
            <ui-select formControlName="role" placeholder="Select a role" [options]="roles()" />
          </div>
        </div>
      }
    </div>

    <div
      class="mx-4 mt-auto flex flex-col-reverse gap-2 border-t border-primary/25 py-2.5 sm:mx-5 sm:flex-row sm:justify-end"
    >
      <a uiButton variant="secondary" routerLink="/users">Cancel</a>
      <button uiButton type="submit" [disabled]="loading() || saving() || !ready()">
        <span>Save</span>
      </button>
    </div>
  </form>
</app-admin-shell>
