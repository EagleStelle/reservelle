<app-admin-shell>
  <form
    [formGroup]="form"
    (ngSubmit)="save()"
    autocomplete="off"
    class="card-surface animate-rise flex min-h-0 flex-1 flex-col overflow-hidden rounded-md"
  >
    <div class="mx-4 border-b border-primary/25 py-3 sm:mx-5">
      <div class="flex items-center gap-2.5 text-primary dark:text-white">
        <ui-icon name="inventory_2" class="text-xl" />
        <h2 class="text-lg font-semibold">Add equipment</h2>
      </div>
    </div>

    <ui-form-feedback
      [saving]="saving()"
      savingText="Saving equipment..."
      [error]="error()"
      (dismissed)="error.set(null)"
    />

    <div class="flex-1 overflow-y-auto p-4 lg:p-5">
      <div class="grid content-start gap-4 sm:grid-cols-2">
        <div class="flex flex-col gap-1.5 sm:col-span-2">
          <label for="add-equipment-name" class="text-sm font-bold text-gray-800 dark:text-zinc-200">
            Name
          </label>
          <input
            uiInput
            id="add-equipment-name"
            name="addEquipmentName"
            type="text"
            formControlName="name"
            autocomplete="off"
          />
        </div>

        <div class="flex flex-col gap-1.5">
          <label class="text-sm font-bold text-gray-800 dark:text-zinc-200">Service</label>
          <ui-select
            formControlName="facilityId"
            placeholder="Select service"
            [options]="facilities()"
          />
        </div>

        <div class="flex flex-col gap-1.5">
          <label class="text-sm font-bold text-gray-800 dark:text-zinc-200">Status</label>
          <ui-select formControlName="status" placeholder="Select status" [options]="statuses" />
        </div>
      </div>
    </div>

    <div
      class="mx-4 mt-auto flex flex-col-reverse gap-2 border-t border-primary/25 py-2.5 sm:mx-5 sm:flex-row sm:justify-end"
    >
      <a uiButton variant="secondary" routerLink="/equipments">Cancel</a>
      <button uiButton type="submit" [disabled]="saving()">
        <span>Save</span>
      </button>
    </div>
  </form>
</app-admin-shell>
