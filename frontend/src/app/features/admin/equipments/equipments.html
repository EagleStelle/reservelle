<app-admin-shell>
  <section class="flex shrink-0 flex-col gap-3 sm:flex-row sm:items-center">
    <ui-input-search class="flex-1" [value]="search()" (valueChange)="onSearch($event)" />
    <ui-segmented
      [options]="serviceFilters"
      [value]="activeService()"
      (valueChange)="selectService($any($event))"
    />
    <a uiButton routerLink="/equipments/new" class="w-full sm:w-auto">
      <ui-icon name="add" [size]="20" />
      <span>Add Equipment</span>
    </a>
  </section>

  <ui-data-table minWidthClass="min-w-150" [loading]="loading()">
        <thead class="sticky top-0 z-10">
          <tr class="bg-primary text-sm font-semibold text-white">
           <th
  class="w-[40%] px-3.5 py-2.5 cursor-pointer"
  (click)="sortBy('name')"
>
  Name
</th>

<th
  class="w-[25%] px-3 py-2.5 cursor-pointer"
  (click)="sortBy('facilityName')"
>
  Service
</th>

<th
  class="w-[15%] px-3 py-2.5 text-center cursor-pointer"
  (click)="sortBy('status')"
>
  Status
</th>
            <th class="w-[20%] px-3 py-2.5 text-center">Actions</th>
          </tr>
        </thead>
        <tbody uiAutoAnimate>
          @if (error()) {
            <tr>
              <td colspan="4" class="px-3 py-6 text-center text-red-600">{{ error() }}</td>
            </tr>
          } @else if (!loading() && filtered().length === 0) {
            <tr>
              <td colspan="4" class="px-3 py-6 text-center text-gray-500 dark:text-zinc-400">
                No equipments found.
              </td>
            </tr>
          } @else {
            @for (equipment of filtered(); track equipment.id) {
              <tr
                class="border-b border-zinc-200 transition-colors hover:bg-secondary/5 dark:border-zinc-700 dark:hover:bg-secondary/15"
              >
                <td class="px-3.5 py-2.5 text-black dark:text-zinc-100">{{ equipment.name ?? '—' }}</td>
                <td class="px-3 py-2.5 text-black dark:text-zinc-100">
                  {{ equipment.facilityName ?? '—' }}
                </td>
                <td class="px-3 py-2.5 text-center">
                  <ui-status-badge [status]="equipment.status" />
                </td>
                <td class="px-3 py-2.5">
                  <div
                    class="flex items-center justify-center gap-2 text-gray-500 dark:text-zinc-400"
                  >
                    <a
                      title="Edit"
                      [routerLink]="['/equipments', equipment.id, 'edit']"
                      class="cursor-pointer rounded-md p-1 hover:text-primary"
                    >
                      <ui-icon name="edit_square" class="text-xl" />
                    </a>
                    <button
                      type="button"
                      (click)="toggleStatus(equipment)"
                      class="cursor-pointer rounded-md p-1 hover:text-primary"
                    >
                      <ui-icon
                        [name]="isActive(equipment.status) ? 'pause_circle' : 'play_circle'"
                        class="text-xl"
                      />
                    </button>
                    <button
                      type="button"
                      title="Delete"
                      (click)="remove(equipment)"
                      class="cursor-pointer rounded-md p-1 hover:text-red-600"
                    >
                      <ui-icon name="delete" class="text-xl" />
                    </button>
                  </div>
                </td>
              </tr>
            }
          }
        </tbody>
  </ui-data-table>

  <ui-toast
    class="contents"
    [show]="showToast()"
    [success]="toastSuccess()"
    [message]="toastMessage()"
  />
</app-admin-shell>
