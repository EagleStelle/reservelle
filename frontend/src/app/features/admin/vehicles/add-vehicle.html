<app-admin-shell>
  <form
    [formGroup]="form"
    (ngSubmit)="save()"
    autocomplete="off"
    class="card-surface flex min-h-0 flex-1 flex-col overflow-hidden rounded-md"
  >
    <div class="mx-4 border-b border-primary/25 py-3 sm:mx-5">
      <div class="flex items-center gap-2.5 text-primary dark:text-white">
        <ui-icon name="directions_car" class="text-xl" />
        <h2 class="text-lg font-semibold">Add vehicle</h2>
      </div>
    </div>

    <ui-form-feedback
      [saving]="saving()"
      savingText="Saving vehicle..."
      [error]="error()"
      (dismissed)="error.set(null)"
    />

    <div class="min-h-0 flex-1 overflow-y-auto p-4 lg:p-5">
      <div class="grid content-start gap-4 sm:grid-cols-2">
          <div class="flex flex-col gap-1.5">
            <label
              for="add-vehicle-brand"
              class="text-sm font-bold text-gray-800 dark:text-zinc-200"
            >
              Brand
            </label>
            <input
              uiInput
              id="add-vehicle-brand"
              name="addVehicleBrand"
              type="text"
              formControlName="brand"
              autocomplete="off"
              placeholder="Toyota"
            />
          </div>

          <div class="flex flex-col gap-1.5">
            <label
              for="add-vehicle-plate"
              class="text-sm font-bold text-gray-800 dark:text-zinc-200"
            >
              Plate Number
            </label>
            <input
              uiInput
              id="add-vehicle-plate"
              name="addVehiclePlate"
              type="text"
              formControlName="plate_num"
              autocomplete="off"
              placeholder="ABC 1234"
            />
          </div>

          <div class="flex flex-col gap-1.5">
            <label
              for="add-vehicle-capacity"
              class="text-sm font-bold text-gray-800 dark:text-zinc-200"
            >
              Capacity
            </label>
            <input
              uiInput
              id="add-vehicle-capacity"
              name="addVehicleCapacity"
              type="number"
              min="1"
              formControlName="capacity"
              autocomplete="off"
            />
          </div>

          <div class="flex flex-col gap-1.5">
            <label class="text-sm font-bold text-gray-800 dark:text-zinc-200">Status</label>
            <ui-select formControlName="status" placeholder="Select status" [options]="statuses" />
          </div>

          <div class="flex flex-col gap-1.5 sm:col-span-2">
            <label
              for="add-vehicle-description"
              class="text-sm font-bold text-gray-800 dark:text-zinc-200"
            >
              Description
            </label>
            <input
              uiInput
              id="add-vehicle-description"
              name="addVehicleDescription"
              type="text"
              formControlName="vehicleDescription"
              autocomplete="off"
              placeholder="Passenger van for campus transport"
            />
          </div>
      </div>
    </div>

    <div
      class="mx-4 mt-auto flex flex-col-reverse gap-2 border-t border-primary/25 py-2.5 sm:mx-5 sm:flex-row sm:justify-end"
    >
      <a uiButton variant="secondary" routerLink="/vehicles">Cancel</a>
      <button uiButton type="submit" [disabled]="saving()">
        <span>Save</span>
      </button>
    </div>
  </form>
</app-admin-shell>
