<app-admin-shell>
  <form
    [formGroup]="form"
    (ngSubmit)="save()"
    autocomplete="off"
    class="bg-white/45 backdrop-blur-xl backdrop-saturate-150 ring-1 ring-inset ring-white/60 shadow-[inset_0_1px_0_rgba(255,255,255,0.8),0_16px_40px_-12px_rgba(24,24,27,0.18)] dark:bg-zinc-900/50 dark:ring-white/10 dark:shadow-[inset_0_1px_0_rgba(255,255,255,0.08),0_18px_44px_-14px_rgba(0,0,0,0.6)] animate-rise flex min-h-0 flex-1 flex-col overflow-hidden rounded-2xl"
  >
    <div class="mx-5 border-b border-primary/30 py-3.5 sm:mx-7">
      <div class="flex items-center gap-3 text-primary dark:text-white">
        <ui-icon name="edit_square" class="text-2xl" />
        <h2 class="text-xl font-black">UPDATE VEHICLE</h2>
      </div>
    </div>

    <ui-form-feedback
      [saving]="saving()"
      savingText="Saving changes..."
      [error]="error()"
      (dismissed)="error.set(null)"
    />

    <div class="flex-1 overflow-y-auto p-5 lg:p-7">
      @if (loading()) {
        <div class="py-10 text-center text-sm text-gray-500 dark:text-zinc-400">
          Loading vehicle...
        </div>
      } @else if (ready()) {
        <div class="grid content-start gap-5 sm:grid-cols-2">
          <div class="flex flex-col gap-1.5">
            <label
              for="edit-vehicle-brand"
              class="text-sm font-bold text-gray-800 dark:text-zinc-200"
            >
              Brand
            </label>
            <input
              uiInput
              id="edit-vehicle-brand"
              name="editVehicleBrand"
              type="text"
              formControlName="brand"
              autocomplete="off"
            />
          </div>

          <div class="flex flex-col gap-1.5">
            <label
              for="edit-vehicle-plate"
              class="text-sm font-bold text-gray-800 dark:text-zinc-200"
            >
              Plate Number
            </label>
            <input
              uiInput
              id="edit-vehicle-plate"
              name="editVehiclePlate"
              type="text"
              formControlName="plate_num"
              autocomplete="off"
            />

            <span class="mt-2 text-sm font-bold text-gray-800 dark:text-zinc-200">Image</span>
            <label
              class="border border-zinc-950/15 bg-white/70 backdrop-blur-md backdrop-saturate-150 ring-1 ring-inset ring-white/75 shadow-[inset_0_1px_0_rgba(255,255,255,0.75),inset_0_-1px_0_rgba(24,24,27,0.05),0_2px_8px_-3px_rgba(24,24,27,0.2)] dark:border-white/15 dark:bg-zinc-800/70 dark:ring-white/10 dark:shadow-[inset_0_1px_0_rgba(255,255,255,0.08),inset_0_-1px_0_rgba(0,0,0,0.28),0_2px_10px_-2px_rgba(0,0,0,0.65)] flex aspect-square w-32 cursor-pointer items-center justify-center overflow-hidden rounded-lg text-gray-500 transition-all duration-200 hover:border-secondary/45 hover:ring-secondary/25 dark:text-zinc-400"
            >
              @if (imagePreview()) {
                <img
                  [src]="imagePreview()"
                  alt="Vehicle image"
                  class="h-full w-full object-cover"
                />
              } @else {
                <ui-icon name="add_photo_alternate" class="text-3xl" />
              }
              <input
                type="file"
                accept="image/*"
                class="sr-only"
                (change)="onImageSelected($event)"
              />
            </label>
          </div>

          <div class="flex flex-col gap-1.5">
            <label
              for="edit-vehicle-capacity"
              class="text-sm font-bold text-gray-800 dark:text-zinc-200"
            >
              Capacity
            </label>
            <input
              uiInput
              id="edit-vehicle-capacity"
              name="editVehicleCapacity"
              type="number"
              min="1"
              formControlName="capacity"
              autocomplete="off"
            />
          </div>

          <div class="flex flex-col gap-1.5">
            <label class="text-sm font-bold text-gray-800 dark:text-zinc-200">Status</label>
            <ui-select
              formControlName="status"
              placeholder="Select status"
              [options]="statuses()"
            />
          </div>

          <div class="flex flex-col gap-1.5 sm:col-span-2">
            <label
              for="edit-vehicle-description"
              class="text-sm font-bold text-gray-800 dark:text-zinc-200"
            >
              Description
            </label>
            <input
              uiInput
              id="edit-vehicle-description"
              name="editVehicleDescription"
              type="text"
              formControlName="vehicleDescription"
              autocomplete="off"
            />
          </div>
        </div>
      }
    </div>

    <div
      class="mx-5 mt-auto flex flex-col-reverse gap-3 border-t border-primary/30 py-3 sm:mx-7 sm:flex-row sm:justify-end"
    >
      <a uiButton variant="secondary" routerLink="/vehicles"> CANCEL </a>
      <button uiButton type="submit" [disabled]="loading() || saving() || !ready()">
        <span>SAVE</span>
      </button>
    </div>
  </form>
</app-admin-shell>
